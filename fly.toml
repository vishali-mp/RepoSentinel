app = "reposentinel"
primary_region = "iad"

[build]
  dockerfile = "webapp/Dockerfile"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[mounts]]
  source = "chroma_data"
  destination = "/app/.sentinel/chroma"

[env]
  SENTINEL_DB_PATH = "/app/.sentinel/chroma"
  RATE_LIMIT = "5/minute"
  REPO_COOLDOWN_SECONDS = "600"
