app = 'reposentinel'
primary_region = 'iad'

[build]

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[mounts]]
  source = 'chroma_data'
  destination = '/app/.sentinel/chroma'

[env]
  SENTINEL_DB_PATH = '/app/.sentinel/chroma'
  RATE_LIMIT = '5/minute'
  REPO_COOLDOWN_SECONDS = '600'
